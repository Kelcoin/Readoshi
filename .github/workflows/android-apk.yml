name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Resolve build metadata
        id: metadata
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { resolveAppVersion } from './scripts/app-version.mjs';

          const branch = process.env.GITHUB_REF_NAME;
          if (!['dev', 'main'].includes(branch)) {
            throw new Error('Android builds only support dev or main');
          }

          const resolved = resolveAppVersion({ cwd: process.cwd(), hash: process.env.GITHUB_SHA });
          const packageVersion = resolved.packageVersion;
          const shortSha = process.env.GITHUB_SHA.slice(0, 7);
          const versionCode = Number(process.env.GITHUB_RUN_NUMBER);
          if (!Number.isSafeInteger(versionCode) || versionCode < 1) {
            throw new Error('GITHUB_RUN_NUMBER must be a positive integer');
          }

          const versionName = resolved.version;
          const values = {
            package_version: packageVersion,
            release_tag: `v${packageVersion}`,
            short_sha: shortSha,
            version_name: versionName,
            version_code: String(versionCode),
            apk_prefix: `Readoshi-${versionName}`,
          };
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            Object.entries(values).map(([key, value]) => `${key}=${value}\n`).join(''),
          );
          NODE

      - name: Install web dependencies
        run: npm ci --no-audit --no-fund

      - name: Install temporary Capacitor dependencies
        run: >-
          npm install --no-save --package-lock=false --no-audit --no-fund
          @capacitor/core@8.4.1 @capacitor/cli@8.4.1 @capacitor/android@8.4.1
          @capacitor/assets@3.0.5

      - name: Build web app
        env:
          VITE_GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Prepare temporary Android wrapper
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const config = {
            appId: 'com.kelcoin.readoshi',
            appName: 'Readoshi',
            webDir: 'dist',
            backgroundColor: '#0f1115',
            android: {
              backgroundColor: '#0f1115',
              allowMixedContent: true
            },
            server: {
              cleartext: true
            },
            plugins: {
              SystemBars: {
                insetsHandling: 'css',
                style: 'DARK',
                hidden: false
              }
            }
          };
          fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2) + '\n');

          if (!fs.existsSync('public/logo-white.png')) throw new Error('public/logo-white.png missing');
          fs.mkdirSync('assets', { recursive: true });
          fs.copyFileSync('public/logo-white.png', path.join('assets', 'logo.png'));

          const indexPath = path.join('dist', 'index.html');
          let html = fs.readFileSync(indexPath, 'utf8');
          const viewport = /(<meta\s+name="viewport"\s+content=")([^"]*)(")/;
          if (!viewport.test(html)) throw new Error('viewport meta anchor missing');
          html = html.replace(viewport, (_, start, value, end) =>
            start + (value.includes('viewport-fit=cover') ? value : value + ', viewport-fit=cover') + end);
          fs.writeFileSync(indexPath, html);

          const assetDir = path.join('dist', 'assets');
          const cssFiles = fs.readdirSync(assetDir).filter((name) => /^index-.*\.css$/.test(name));
          if (cssFiles.length !== 1) throw new Error('expected one Vite CSS asset');
          fs.appendFileSync(path.join(assetDir, cssFiles[0]), `
          /* lrr-android-safe-area */
          :root{--lrr-android-safe-top:var(--safe-area-inset-top,env(safe-area-inset-top,0px))}
          html{background:#0f1115}
          body{box-sizing:border-box;padding-top:var(--lrr-android-safe-top);min-height:100dvh}
          .login-shell{min-height:calc(100dvh - var(--lrr-android-safe-top))!important}
          .reader-root{margin-top:calc(-1 * var(--lrr-android-safe-top))}
          .reader-toolbar{padding-top:calc(14px + var(--lrr-android-safe-top))!important}
          `);
          NODE

          npx --no-install cap add android
          npx --no-install cap sync android
          npx --no-install capacitor-assets generate --android \
            --iconBackgroundColor '#1C1E24' \
            --iconBackgroundColorDark '#1C1E24' \
            --splashBackgroundColor '#0f1115' \
            --splashBackgroundColorDark '#0f1115'

      - name: Configure Android version and signing
        env:
          APP_VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          APP_VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${ANDROID_KEYSTORE_BASE64:?Missing ANDROID_KEYSTORE_BASE64}"
          : "${ANDROID_KEYSTORE_PASSWORD:?Missing ANDROID_KEYSTORE_PASSWORD}"
          : "${ANDROID_KEY_ALIAS:?Missing ANDROID_KEY_ALIAS}"
          : "${ANDROID_KEY_PASSWORD:?Missing ANDROID_KEY_PASSWORD}"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore

          node <<'NODE'
          const fs = require('node:fs');

          const gradlePath = 'android/app/build.gradle';
          let gradle = fs.readFileSync(gradlePath, 'utf8');
          const replaceOnce = (anchor, replacement) => {
            const first = gradle.indexOf(anchor);
            if (first < 0 || gradle.indexOf(anchor, first + anchor.length) >= 0) {
              throw new Error('expected one Gradle anchor: ' + anchor);
            }
            gradle = gradle.replace(anchor, replacement);
          };

          replaceOnce('versionCode 1', `versionCode ${process.env.APP_VERSION_CODE}`);
          replaceOnce('versionName "1.0"', `versionName "${process.env.APP_VERSION_NAME}"`);
          replaceOnce('    buildTypes {', `    signingConfigs {
              release {
                  storeFile rootProject.file('release.keystore')
                  storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')
                  keyAlias System.getenv('ANDROID_KEY_ALIAS')
                  keyPassword System.getenv('ANDROID_KEY_PASSWORD')
              }
          }

              buildTypes {`);
          replaceOnce('        release {', `        release {
                      signingConfig signingConfigs.release`);
          fs.writeFileSync(gradlePath, gradle);
          NODE

      - name: Verify temporary Android wrapper
        env:
          APP_VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          APP_VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
          const checks = [
            ['app name', config.appName === 'Readoshi'],
            ['webDir', config.webDir === 'dist'],
            ['mixed content', config.android?.allowMixedContent === true],
            ['cleartext', config.server?.cleartext === true],
            ['CSS insets', config.plugins?.SystemBars?.insetsHandling === 'css'],
            ['system bar style', config.plugins?.SystemBars?.style === 'DARK']
          ];
          for (const [name, valid] of checks) {
            if (!valid) throw new Error('invalid ' + name);
          }

          const indexHtml = fs.readFileSync('dist/index.html', 'utf8');
          if (!indexHtml.includes('viewport-fit=cover')) throw new Error('viewport patch failed');
          const manifest = fs.readFileSync('android/app/src/main/AndroidManifest.xml', 'utf8');
          if (!manifest.includes('android.permission.INTERNET')) throw new Error('INTERNET permission missing');
          const gradle = fs.readFileSync('android/app/build.gradle', 'utf8');
          if (!gradle.includes(`versionName "${process.env.APP_VERSION_NAME}"`)) throw new Error('versionName missing');
          if (!gradle.includes(`versionCode ${process.env.APP_VERSION_CODE}`)) throw new Error('versionCode missing');
          if (!gradle.includes('signingConfig signingConfigs.release')) throw new Error('release signing missing');
          if (!fs.existsSync('android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png')) throw new Error('launcher icon missing');
          if (!fs.existsSync('android/release.keystore')) throw new Error('release keystore missing');
          NODE

      - name: Build Debug and Release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Collect and verify APKs
        env:
          APK_PREFIX: ${{ steps.metadata.outputs.apk_prefix }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk "artifacts/${APK_PREFIX}-debug.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/${APK_PREFIX}-release.apk"
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --print-certs "artifacts/${APK_PREFIX}-release.apk"

      - name: Upload dev APKs
        if: github.ref_name == 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.apk_prefix }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish main APKs to Release
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')"
            if [ "$release_sha" != "$GITHUB_SHA" ]; then
              echo "::error title=Version already released::${RELEASE_TAG} points to ${release_sha}. Bump package.json before publishing ${GITHUB_SHA}."
              exit 1
            fi
            gh release upload "$RELEASE_TAG" artifacts/*.apk --clobber
          else
            gh release create "$RELEASE_TAG" artifacts/*.apk \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
