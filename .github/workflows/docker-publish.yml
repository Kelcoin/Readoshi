name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: Docker Hub image name, for example username/lrr-modern-reader
        required: false
        default: kelcoin/lanraragi-react-reader
        type: string
      tag:
        description: Extra image tag
        required: false
        default: latest
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error title=Missing DOCKERHUB_USERNAME::Add this secret under Settings > Secrets and variables > Actions. Codespaces secrets are not available to Actions workflows."
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error title=Missing DOCKERHUB_TOKEN::Add this secret under Settings > Secrets and variables > Actions. Codespaces secrets are not available to Actions workflows."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ inputs.tag }}
            ${{ inputs.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
