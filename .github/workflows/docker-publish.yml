name: Publish Docker image

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '.github/**'
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error title=Missing DOCKERHUB_USERNAME::Add this secret under Settings > Secrets and variables > Actions. Codespaces secrets are not available to Actions workflows."
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error title=Missing DOCKERHUB_TOKEN::Add this secret under Settings > Secrets and variables > Actions. Codespaces secrets are not available to Actions workflows."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Select Docker tag
        id: docker-tag
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "::error title=Unsupported branch::This workflow only publishes main or dev."
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: kelcoin/readoshi:${{ steps.docker-tag.outputs.tag }}
          build-args: |
            VITE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
